<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sakura - Upload Image</title>
    <style>
        body { font-family: sans-serif; max-width: 480px; margin: 60px auto; padding: 0 16px; }
        h1 { margin-bottom: 24px; }
        .message { padding: 12px; border-radius: 4px; margin-bottom: 16px; }
        .message.success { background: #d4edda; color: #155724; }
        .message.error { background: #f8d7da; color: #721c24; }
        input[type="file"] { display: block; margin-bottom: 16px; }
        button { padding: 8px 20px; cursor: pointer; }
    </style>
</head>
<body>
    <h1>Upload Image</h1>

    <div th:if="${success}" class="message success">Image uploaded successfully.</div>
    <div th:if="${error}" class="message error" th:text="${error}"></div>

    <form method="post" th:action="@{/upload}" enctype="multipart/form-data">
        <input type="file" name="file" accept="image/jpeg,image/png" required>
        <button type="submit">Upload</button>
    </form>
</body>
</html>
